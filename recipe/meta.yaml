{% set version = "1.2.7" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-tsp
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/TSP_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/TSP/TSP_{{ version }}.tar.gz
  sha256: 49929c9488411d2cfdf136f99fa0ec942f0cf65d0573195897ba29b41a135f73

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - cross-r-base {{ r_base }}  # [build_platform != target_platform]
    - r-foreach                  # [build_platform != target_platform]
    - {{ compiler('c') }}        # [not win]
    - {{ stdlib("c") }}          # [not win]
    - {{ compiler('m2w64_c') }}  # [win]
    - {{ stdlib("m2w64_c") }}    # [win]
    - {{ posix }}filesystem      # [win]
    - {{ posix }}make
    - {{ posix }}sed             # [win]
    - {{ posix }}coreutils       # [win]
    - {{ posix }}zip             # [win]
  host:
    - r-base
    - r-foreach
  run:
    - r-base
    - r-foreach

test:
  commands:
    - $R -e "library('TSP')"           # [not win]
    - "\"%R%\" -e \"library('TSP')\""  # [win]

about:
  home: https://github.com/mhahsler/TSP
  license: GPL-3.0-only
  summary: Basic infrastructure and some algorithms for the traveling salesperson problem (also traveling salesman problem; TSP). The package provides some simple algorithms and an interface to the Concorde TSP solver and its implementation of the Chained-Lin-Kernighan heuristic. The code for Concorde itself is not 
    included in the package and has to be obtained separately.
  license_family: GPL3
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3

extra:
  recipe-maintainers:
    - conda-forge/r
    - MathiasHaudgaard
    - FrodePedersen
    - ArneKr
